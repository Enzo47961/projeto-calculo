<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Derivadas</title>
    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Container principal */
    .container {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 400px;
        text-align: center;
    }

    /* Título */
    h1 {
        margin-bottom: 20px;
        color: #333;
    }

    /* Inputs */
    input {
        width: 90%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 16px;
    }

    /* Botões */
    button {
        margin: 5px;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #3730a3;
    }

    /* Resultado */
    #resultado {
        margin-top: 20px;
        font-size: 18px;
        color: #222;
    }

    /* Gráfico */
    #grafico {
        margin-top: 20px;
    }
    </style>
    <script>
    window.MathJax = {
        tex: {
            inlineMath: [['\\(', '\\)']],
            displayMath: [['\\[', '\\]']]
        }
    };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>Calculadora de Cálculo</h1>

        <input type="text" id="equacao" placeholder="Ex: x^2 + 5x">
        <input type="text" id="ponto" placeholder="Ponto (para limite)">

        <div>
            <button onclick="calcular()">Derivar</button>
            <button onclick="integrar()">Integrar</button>
            <button onclick="calcularLimite()">Limite</button>
        </div>

        <div id="resultado"></div>

        <div id="grafico"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
