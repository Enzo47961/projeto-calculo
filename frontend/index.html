<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calcly</title>
    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #1e1e2f, #0f0f1a);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        overflow-y: auto;
    }

    /* Container principal */
    .container {
        background: rgba(255, 255, 255, 0.05);
        padding: 30px;
        border-radius: 20px;
        width: 420px;
        text-align: center;

        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        margin: 40px 0;
    }

    /* Título */
    h1 {
        margin-bottom: 20px;
        color: #ffffff;
        font-weight: 600;
    }

    #modos {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
    }

    .modo-btn {
        padding: 8px 16px;
        font-size: 14px;
    }

    /* Inputs */
    input {
        width: 90%;
        padding: 12px;
        margin: 12px 0;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 16px;

        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    /* Botões */
    button {
        margin: 6px;
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
        transition: 0.2s;

        box-shadow: 0 0 0 rgba(79, 70, 229, 0);
    }

    button:hover {
        background: #6366f1;
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
    }

    .btn-calcular {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        font-size: 16px;
        background: #22c55e;

        box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    }

    /* Resultado */
    #resultado {
        margin-top: 25px;
        padding: 15px;
        border-radius: 12px;

        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);

        color: white;

        box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
    }

    .MathJax {
    color: white !important;
    }

    /* Gráfico */
    #grafico {
        margin-top: 20px;
    }

    .modo-btn.ativo {
        background: #22c55e;
        box-shadow: 0 0 12px rgba(34, 197, 94, 0.7);
    }

    .btn-calcular:hover {
    background: #16a34a;
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.8);
    }

    input:focus {
    outline: none;
    box-shadow: 0 0 10px rgba(99, 102, 241, 0.6);
    }

    </style>
    <script>
    window.MathJax = {
        tex: {
            inlineMath: [['\\(', '\\)']],
            displayMath: [['\\[', '\\]']]
        }
    };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>CALCULUS</h1>

        <div id="modos">
            <button class="modo-btn" onclick="setModo('derivada')">Derivada</button>
            <button class="modo-btn" onclick="setModo('integral')">Integral</button>
            <button class="modo-btn" onclick="setModo('limite')">Limite</button>
            <button class="modo-btn" onclick="setModo('explorar')">Explorar</button>
        </div>

        <input type="text" id="equacao" placeholder="Ex: x^2 + 5x">
        <input type="text" id="ponto" placeholder="Ponto (para limite)">
        <input type="text" id="ponto_a" placeholder="Limite inferior (a)" style="display:none;">
        <input type="text" id="ponto_b" placeholder="Limite superior (b)" style="display:none;">


        <button class="btn-calcular" onclick="executar()">Calcular</button>

        <div id="resultado"></div>

        <div id="grafico"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
